services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: deepcrawl
      POSTGRES_USER: deepcrawl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepcrawl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  cloak-service:
    build:
      context: ./cloak-service
      dockerfile: Dockerfile
    ports:
      - "18000:8000"
    environment:
      CLOAKBROWSER_MAX_CONCURRENT: "3"
      CLOAKBROWSER_TIMEOUT_MS: "30000"
      CLOAKBROWSER_MAX_BROWSERS: "3"
    volumes:
      - cloakdata:/root/.cloakbrowser

  deepcrawl-api:
    profiles:
      - prod
    build:
      context: .
      dockerfile: src/DeepCrawl.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgreSQL: Host=postgres;Database=deepcrawl;Username=deepcrawl;Password=${POSTGRES_PASSWORD}
      CloakBrowser__BaseUrl: http://cloak-service:8000
      Redis__Host: redis
      Redis__Port: 6379
      AI__BaseUrl: ${AI_BASEURL}
      AI__ApiKey: ${AI_APIKEY}
      AI__Model: ${AI_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cloak-service:
        condition: service_started

volumes:
  pgdata:
  cloakdata:
  redisdata:
